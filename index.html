<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Turnazione Parcheggi Via Chimirri 27</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">

  <meta name="theme-color" content="#0b5fd7">
  <meta name="apple-mobile-web-app-title" content="Parcheggi">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <main>
      <section id="homeSection" class="page-section active">
        <div class="sticky-top">
          <header class="compact-header">
            <div>
              <h1>VIA CHIMIRRI 27</h1>
              <div class="subtitle-line">
                <span></span>
                <p class="subtitle">TURNAZIONE PARCHEGGI</p>
                <span></span>
              </div>
            </div>
          </header>

          <section class="smart-toolbar" aria-label="Controlli periodo">
            <button id="homePrevPeriodBtn" class="toolbar-btn" type="button" aria-label="Periodo precedente">‹</button>

            <label class="date-pill" for="homeDateInput">
              <span class="date-pill-icon">📅</span>
              <input id="homeDateInput" type="text" inputmode="numeric" placeholder="gg/mm/aaaa" />
            </label>

            <button id="homeNextPeriodBtn" class="toolbar-btn" type="button" aria-label="Prossimo turno">›</button>
            <button id="homeTodayBtn" class="today-pill" type="button">TORNA AD OGGI</button>
          </section>
        </div>

        <div class="map-card home-map-card">
          <div class="map-title compact-map-title">
            <span>MAPPA POSTI</span>
            <small id="mapDates">PERIODO CORRENTE</small>
          </div>

          <div id="freeParkingBanner" class="free-message" hidden></div>

          <div class="map-legend compact-legend">
            <span class="legend-main">TURNO</span>
            <span class="legend-small">TURNETTO</span>
            <span class="legend-empty">LIBERO</span>
          </div>

          <div class="smart-section-title">POSTI DEL PERIODO</div>
          <div id="parkingMap" class="parking-map smart-parking-map"></div>
          <div class="map-touch-note">👆 TOCCA UNA CARD PER VEDERE LA POSIZIONE SULLA MAPPA REALE.</div>

          <div class="smart-section-title real-map-section-title">MAPPA REALE</div>
          <div id="realMapBox" class="real-map-box open">
            <div class="real-map-scroll">
              <div class="real-map" id="realMap">
                <div id="realParkingMap"></div>
              </div>
            </div>
            <div class="real-map-note">TOCCA UN POSTO SULLA MAPPA PER VEDERE L’ASSEGNATARIO.</div>
          </div>
        </div>
      </section>

      <section id="condominoSection" class="page-section">
        <div class="sticky-top">
          <header class="compact-header">
            <div>
              <h1>VIA CHIMIRRI 27</h1>
              <div class="subtitle-line">
                <span></span>
                <p class="subtitle">TURNAZIONE PARCHEGGI</p>
                <span></span>
              </div>
            </div>
          </header>

          <section class="smart-toolbar" aria-label="Controlli periodo condomino">
            <button id="residentPrevPeriodBtn" class="toolbar-btn" type="button" aria-label="Periodo precedente">‹</button>

            <label class="date-pill" for="residentDateInput">
              <span class="date-pill-icon">📅</span>
              <input id="residentDateInput" type="text" inputmode="numeric" placeholder="gg/mm/aaaa" />
            </label>

            <button id="residentNextPeriodBtn" class="toolbar-btn" type="button" aria-label="Prossimo turno">›</button>
            <button id="residentTodayBtn" class="today-pill" type="button">TORNA AD OGGI</button>
          </section>
        </div>

        <section class="smart-search-card">
          <div class="resident-search-wrap">
            <label class="search-box" for="residentSearchInput">
              <span>🔍</span>
              <input id="residentSearchInput" type="search" placeholder="CERCA CONDOMINO" autocomplete="off" />
            </label>

            <div id="residentSearchResults" class="search-results" hidden></div>
          </div>

          <select id="residentSelect" hidden></select>

          <div id="residentResult" class="resident-result compact-result" hidden></div>
        </section>

        <div class="turn-card resident-list-card">
          <div class="turn-head compact-turn-head">
            <h2>CONDOMINI</h2>
            <div id="residentListDates" class="dates"></div>
          </div>
          <div id="residentList" class="resident-list"></div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav two-tabs">
    <button class="nav-btn active" data-section="homeSection" type="button">
      <span class="nav-icon">🅿️</span>
      <span>HOME</span>
    </button>

    <button class="nav-btn" data-section="condominoSection" type="button">
      <span class="nav-icon">👤</span>
      <span>CONDOMINO</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/it.js"></script>
  <script src="app.js"></script>
</body>
</html>
