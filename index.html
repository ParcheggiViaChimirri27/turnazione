<!doctype html>
<html lang="it">

<body>

    <section class="quick-actions">

      <!-- CERCA CONDOMINO -->
      <button id="openResident" class="action-card" type="button">

        <span class="action-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">

            Cerca per data
          </span>

            Trova la turnazione in una data specifica
          </span>
        </span>

        <span class="chev">›</span>
      </button>

      <div id="datePanel" class="panel">

            <label for="dateInput">

                viewBox="0 0 24 24"
                fill="none">

                <path d="M16 11a4 4 0 1 0-8 0M4 20a8 8 0 0 1 16 0"
