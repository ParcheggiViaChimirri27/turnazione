<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Turnazione Parcheggi Via Chimirri 27</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">

  <meta name="theme-color" content="#0b5fd7">
  <meta name="apple-mobile-web-app-title" content="Parcheggi">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
<header>
  <div>
    <h1>VIA CHIMIRRI 27</h1>
    <div class="subtitle-line">
      <span></span>
      <p class="subtitle">TURNAZIONE PARCHEGGI</p>
      <span></span>
    </div>
  </div>
</header>

    <main>
      <!-- HOME -->
      <section id="homeSection" class="page-section active">
        <section class="quick-actions">
          <button id="openHomeDate" class="action-card" type="button">
            <span class="action-icon" aria-hidden="true">📅</span>
            <span>
              <span class="action-title">Cerca per data</span>
              <span class="action-sub">Visualizza i turni in una data specifica</span>
            </span>
            <span class="chev">›</span>
          </button>

          <div id="homeDatePanel" class="panel">
            <div class="date-grid">
              <div>
                <label for="homeDateInput">Data</label>
                <input id="homeDateInput" type="date" />
              </div>

              <button id="homeTodayBtn" class="primary-btn" type="button">
                Mostra data attuale
              </button>
            </div>
          </div>
        </section>

        <div class="cards-grid">
          <div class="turn-card">
            <div class="turn-head">
              <div class="head-icon" aria-hidden="true">👥</div>
              <div>
                <h2 id="mainTitle">Gruppo principale</h2>
                <div id="mainDates" class="dates"></div>
              </div>
            </div>

            <div id="mainTable" class="table-wrap"></div>
          </div>

          <div class="turn-card">
            <div class="turn-head">
              <div class="head-icon" aria-hidden="true">👤</div>
              <div>
                <h2 id="smallTitle">Gruppetto</h2>
                <div id="smallDates" class="dates"></div>
              </div>
            </div>

            <div id="smallTable" class="table-wrap"></div>
          </div>
        </div>
      </section>

      <!-- CONDOMINO -->
      <button id="openResidentSearch" class="action-card" type="button">
  <span class="action-icon" aria-hidden="true">🏠</span>
  <span>
    <span class="action-title">Cerca condomino</span>
    <span class="action-sub">Seleziona il condomino e visualizza il posto</span>
  </span>
  <span class="chev">›</span>
</button>

<div id="residentSearchPanel" class="panel">
  <label for="residentSelect">Condomino</label>
  <select id="residentSelect"></select>

  <div id="residentResult" class="resident-result">
    Seleziona una data e un condomino.
  </div>
</div>

<button id="openResidentDate" class="action-card" type="button">
  <span class="action-icon" aria-hidden="true">📅</span>
  <span>
    <span class="action-title">Data</span>
    <span class="action-sub">Scegli la data per controllare il posto</span>
  </span>
  <span class="chev">›</span>
</button>

<div id="residentDatePanel" class="panel">
  <div class="date-grid">
    <div>
      <label for="residentDateInput">Data</label>
      <input id="residentDateInput" type="date" />
    </div>

    <button id="residentTodayBtn" class="primary-btn" type="button">
      Mostra data attuale
    </button>
  </div>
</div>

      <!-- MAPPA -->
      <section id="mapSection" class="page-section">
        <section class="quick-actions">
          <button id="openMapDate" class="action-card" type="button">
            <span class="action-icon" aria-hidden="true">📅</span>
            <span>
              <span class="action-title">Cerca per data</span>
              <span class="action-sub">Aggiorna la mappa in base alla data</span>
            </span>
            <span class="chev">›</span>
          </button>

          <div id="mapDatePanel" class="panel">
            <div class="date-grid">
              <div>
                <label for="mapDateInput">Data</label>
                <input id="mapDateInput" type="date" />
              </div>

              <button id="mapTodayBtn" class="primary-btn" type="button">
                Mostra data attuale
              </button>
            </div>
          </div>
        </section>

        <div class="map-card">
          <div class="map-title">
            <span>Mappa posti</span>
            <small id="mapDates">periodo corrente</small>
          </div>

          <div id="parkingMap" class="parking-map"></div>
		  <div class="map-legend">
  <span class="legend-main">Gruppo principale</span>
  <span class="legend-small">Gruppetto</span>
  <span class="legend-empty">Non attivo / libero</span>
</div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-section="homeSection" type="button">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>

    <button class="nav-btn" data-section="condominoSection" type="button">
      <span class="nav-icon">👤</span>
      <span>Condomino</span>
    </button>

    <button class="nav-btn" data-section="mapSection" type="button">
      <span class="nav-icon">🅿️</span>
      <span>Mappa</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
